name: Deploy to Dev

on:
  push:
    branches: [develop]
  workflow_dispatch:

permissions:
  id-token: write   # OIDC
  contents: read
  packages: read     # GitHub Packages (npm install @leasebase/service-common)

env:
  DEPLOY_CONFIG: deploy.dev.json

jobs:
  build-and-deploy:
    name: Build → Scan → Push → Deploy
    runs-on: ubuntu-latest
    steps:
      # ── Checkout ─────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Node.js + GitHub Packages auth ───────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
          scope: '@leasebase'

      # ── Install + test + lint ────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}


      # ── Dependency version gate ───────────────────────────────────────────
      - name: Check @leasebase/service-common version
        run: |
          RESOLVED=$(npm ls @leasebase/service-common --json 2>/dev/null | jq -r '.dependencies["@leasebase/service-common"].version // empty')
          REQUIRED="2.0.5"
          if [ -z "$RESOLVED" ]; then
            echo "::error::Could not resolve @leasebase/service-common version"
            exit 1
          fi
          if [ "$(printf '%s\n' "$REQUIRED" "$RESOLVED" | sort -V | head -n1)" != "$REQUIRED" ]; then
            echo "::error::@leasebase/service-common $RESOLVED < required $REQUIRED"
            exit 1
          fi
          echo "✓ @leasebase/service-common $RESOLVED >= $REQUIRED"

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      # ── Docker buildx ───────────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── AWS OIDC ────────────────────────────────────────────────────────
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: us-west-2

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # ── Install Trivy ──────────────────────────────────────────────────
      - name: Install Trivy
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update && sudo apt-get install -y trivy

      # ── Build, scan, push ──────────────────────────────────────────────
      - name: Build, scan & push to ECR
        id: build
        run: bash scripts/build_push.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Print build info ────────────────────────────────────────────────
      - name: Print build info
        run: |
          echo "══════════════════════════════════════════════"
          echo "  Commit SHA : ${{ github.sha }}"
          echo "  Image (SHA): ${{ steps.build.outputs.image_sha }}"
          echo "  Image (dev): ${{ steps.build.outputs.image }}"
          echo "  Digest     : ${{ steps.build.outputs.digest }}"
          echo "══════════════════════════════════════════════"

      # ── Blocking pre-deploy migrations ────────────────────────────────
      - name: Run database migrations
        run: |
          # Download the migration runner from leasebase-iac (pinned to develop)
          curl -fsSL \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3.raw" \
            "https://api.github.com/repos/leasebase/leasebase-iac/contents/scripts/run-service-migrations.sh?ref=develop" \
            -o /tmp/run-service-migrations.sh
          chmod +x /tmp/run-service-migrations.sh
          bash /tmp/run-service-migrations.sh
        env:
          SERVICE_NAME: payments-service
          MIGRATIONS_DIR: db/migrations

      # ── Advisory schema drift check ──────────────────────────────────
      - name: Advisory schema drift check
        continue-on-error: true
        run: |
          echo "### Schema Drift Check" >> "$GITHUB_STEP_SUMMARY"

          # Read required-tables.txt and generate SQL checks
          SQL_PARTS=""
          ENTRY_COUNT=0
          while IFS= read -r line || [[ -n "$line" ]]; do
            line=$(echo "$line" | sed 's/#.*//' | xargs)
            [[ -z "$line" ]] && continue

            IFS='.' read -ra parts <<< "$line"
            if [[ ${#parts[@]} -eq 2 ]]; then
              schema="${parts[0]}"; table="${parts[1]}"
              SQL_PARTS="${SQL_PARTS:+$SQL_PARTS UNION ALL }SELECT '${line}' AS target, CASE WHEN EXISTS(SELECT 1 FROM information_schema.tables WHERE table_schema='${schema}' AND table_name='${table}') THEN 'OK' ELSE 'MISSING' END AS status"
            elif [[ ${#parts[@]} -eq 3 ]]; then
              schema="${parts[0]}"; table="${parts[1]}"; column="${parts[2]}"
              SQL_PARTS="${SQL_PARTS:+$SQL_PARTS UNION ALL }SELECT '${line}' AS target, CASE WHEN EXISTS(SELECT 1 FROM information_schema.columns WHERE table_schema='${schema}' AND table_name='${table}' AND column_name='${column}') THEN 'OK' ELSE 'MISSING' END AS status"
            fi
            ENTRY_COUNT=$((ENTRY_COUNT + 1))
          done < db/required-tables.txt

          if [[ $ENTRY_COUNT -eq 0 ]]; then
            echo "No entries to check."
            exit 0
          fi

          FULL_SQL="SELECT '--- DRIFT CHECK START ---'; ${SQL_PARTS}; SELECT '--- DRIFT CHECK END ---';"
          SHELL_CMD="echo $(echo "$FULL_SQL" | jq -Rs .) | psql -t -A -F '|' -v ON_ERROR_STOP=1 -f -"

          # Launch ECS Fargate task
          OVERRIDES=$(jq -nc --arg cmd "$SHELL_CMD" '{containerOverrides: [{name: "migration", command: [$cmd]}]}')
          NET_CONFIG='{"awsvpcConfiguration":{"subnets":["subnet-0e7baf6f8acab4128","subnet-0cb18fcd067bdbedb"],"securityGroups":["sg-0bb6c9fa69a698130"],"assignPublicIp":"DISABLED"}}'

          TASK_RESULT=$(aws ecs run-task \
            --cluster leasebase-dev-v2-cluster \
            --task-definition leasebase-dev-v2-db-migration \
            --launch-type FARGATE \
            --network-configuration "$NET_CONFIG" \
            --overrides "$OVERRIDES" \
            --region us-west-2 --output json 2>&1) || { echo "::warning::Schema drift check failed to launch"; exit 0; }

          TASK_ARN=$(echo "$TASK_RESULT" | jq -r '.tasks[0].taskArn // empty')
          [[ -z "$TASK_ARN" ]] && { echo "::warning::No task ARN returned"; exit 0; }
          TASK_ID="${TASK_ARN##*/}"
          echo "Task launched: $TASK_ID"

          # Wait for completion
          for i in $(seq 1 24); do
            sleep 5
            STATUS=$(aws ecs describe-tasks --cluster leasebase-dev-v2-cluster --tasks "$TASK_ARN" --region us-west-2 --output json | jq -r '.tasks[0].lastStatus')
            [[ "$STATUS" == "STOPPED" ]] && break
          done
          [[ "$STATUS" != "STOPPED" ]] && { echo "::warning::Drift check task timed out"; exit 0; }

          sleep 3
          LOG_STREAM="diag-roles/migration/$TASK_ID"
          LOG_OUTPUT=$(aws logs get-log-events \
            --log-group-name /ecs/leasebase-dev-v2-db-migration \
            --log-stream-name "$LOG_STREAM" \
            --region us-west-2 --output json 2>/dev/null | jq -r '.events[].message' 2>/dev/null || echo "")

          # Parse results
          MISSING=0
          IN_RESULTS=false
          while IFS= read -r line; do
            [[ "$line" == *"DRIFT CHECK START"* ]] && { IN_RESULTS=true; continue; }
            [[ "$line" == *"DRIFT CHECK END"* ]] && { IN_RESULTS=false; continue; }
            if [[ "$IN_RESULTS" == true && "$line" == *"|"* ]]; then
              target=$(echo "$line" | cut -d'|' -f1 | xargs)
              status=$(echo "$line" | cut -d'|' -f2 | xargs)
              if [[ "$status" == "MISSING" ]]; then
                echo "::warning::Schema drift: $target is MISSING"
                MISSING=$((MISSING + 1))
              fi
            fi
          done <<< "$LOG_OUTPUT"

          if [[ $MISSING -gt 0 ]]; then
            echo "⚠️ $MISSING required table(s)/column(s) missing (advisory — deploy proceeds)" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "✅ All $ENTRY_COUNT required tables/columns present." >> "$GITHUB_STEP_SUMMARY"
          fi

      # ── Deploy to ECS ──────────────────────────────────────────────────
      - name: Deploy to ECS Dev
        run: bash scripts/deploy_ecs.sh
        env:
          IMAGE: ${{ steps.build.outputs.image_sha }}
